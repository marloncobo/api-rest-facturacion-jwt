version: "3.8"

services:
  app:
    build: .
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:mysql://db:3306/facturacion
      DATABASE_USERNAME: user
      DATABASE_PASSWORD: password
    depends_on:
      - db

  db:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: facturacion
      MYSQL_USER: user
      MYSQL_PASSWORD: password
    ports:
      - "3307:3306"   # usa 3307 en tu máquina para evitar conflicto con MySQL local
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: